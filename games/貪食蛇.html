<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 貪食蛇 Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #134e5e 0%, #71b280 100%);
    min-height: 100vh;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    font-size: 38px;
    letter-spacing: 4px;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.25);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 18px;
    letter-spacing: 2px;
  }
  .hud {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hud-box {
    background: rgba(0, 0, 0, 0.25);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 14px;
    padding: 10px 22px;
    text-align: center;
    backdrop-filter: blur(8px);
    min-width: 110px;
  }
  .hud-label {
    font-size: 12px;
    opacity: 0.8;
    letter-spacing: 2px;
  }
  .hud-value {
    font-size: 26px;
    font-weight: bold;
    color: #ffd93d;
    margin-top: 2px;
  }
  .board-wrap {
    position: relative;
    padding: 14px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }
  canvas {
    display: block;
    background: #0f3a2c;
    border-radius: 10px;
    image-rendering: pixelated;
  }
  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    text-align: center;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    font-size: 36px;
    color: #ffd93d;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }
  .overlay p {
    font-size: 14px;
    opacity: 0.9;
    line-height: 1.7;
    letter-spacing: 1px;
  }
  .btn {
    background: linear-gradient(135deg, #ffd93d, #ff6b6b);
    color: #2c1810;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
    font-family: inherit;
    transition: transform 0.15s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
  .controls {
    margin-top: 18px;
    font-size: 13px;
    opacity: 0.85;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.7;
  }
  .controls b { color: #ffd93d; }
  .back {
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(0, 0, 0, 0.35);
    color: #fff;
    padding: 8px 16px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .back:hover { background: rgba(0,0,0,0.55); }
  /* 手機虛擬鍵 */
  .dpad {
    margin-top: 18px;
    display: none;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
  }
  .dpad button {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    font-family: inherit;
  }
  .dpad button:active { background: rgba(255,255,255,0.35); }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }
  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .dpad { display: grid; }
  }
</style>
</head>
<body>
<a href="../index.html" class="back">← 返回</a>

<h1>🐍 貪食蛇</h1>
<div class="subtitle">SNAKE  ·  經典街機</div>

<div class="hud">
  <div class="hud-box">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">BEST</div>
    <div class="hud-value" id="best">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">SPEED</div>
    <div class="hud-value" id="speed">1</div>
  </div>
</div>

<div class="board-wrap">
  <canvas id="game" width="440" height="440"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="overlayTitle">準備好了嗎？</h2>
    <p id="overlayMsg">使用 <b>方向鍵</b> 或 <b>WASD</b> 控制方向<br>按 <b>空白鍵</b> 暫停 / 繼續</p>
    <button class="btn" id="startBtn">▶ 開始遊戲</button>
  </div>
</div>

<div class="dpad" id="dpad">
  <button class="up" data-dir="U">▲</button>
  <button class="left" data-dir="L">◀</button>
  <button class="right" data-dir="R">▶</button>
  <button class="down" data-dir="D">▼</button>
</div>

<div class="controls">
  <p><b>方向鍵 / WASD</b> 移動 &nbsp;|&nbsp; <b>空白</b> 暫停 &nbsp;|&nbsp; <b>R</b> 重玩</p>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 22;
  const CELL = canvas.width / GRID;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const speedEl = document.getElementById('speed');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');

  const BEST_KEY = 'cc_snake_best';
  let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, speedLevel, tickMs, lastTick, running, paused, dead;

  function reset() {
    snake = [
      { x: 10, y: 11 },
      { x: 9, y: 11 },
      { x: 8, y: 11 },
    ];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    speedLevel = 1;
    tickMs = 140;
    placeFood();
    running = false;
    paused = false;
    dead = false;
    updateHud();
    draw();
  }

  function placeFood() {
    while (true) {
      const x = Math.floor(Math.random() * GRID);
      const y = Math.floor(Math.random() * GRID);
      if (!snake.some(s => s.x === x && s.y === y)) {
        food = { x, y };
        return;
      }
    }
  }

  function updateHud() {
    scoreEl.textContent = score;
    speedEl.textContent = speedLevel;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem(BEST_KEY, best);
    }
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞牆
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      return gameOver();
    }
    // 撞自己
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      // 每 50 分加速
      const newLv = 1 + Math.floor(score / 50);
      if (newLv !== speedLevel) {
        speedLevel = newLv;
        tickMs = Math.max(60, 140 - (speedLevel - 1) * 10);
      }
      placeFood();
      updateHud();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // 背景方格
    ctx.fillStyle = '#0f3a2c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i < GRID; i++) {
      for (let j = 0; j < GRID; j++) {
        if ((i + j) % 2 === 0) ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
      }
    }

    // 食物（果實）
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const pulse = 1 + Math.sin(Date.now() / 200) * 0.08;
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.arc(fx, fy, (CELL / 2 - 2) * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6bcf7e';
    ctx.fillRect(fx - 2, fy - CELL / 2 + 1, 4, 4);

    // 蛇身
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const x = s.x * CELL;
      const y = s.y * CELL;
      const isHead = i === 0;
      const t = 1 - i / Math.max(snake.length, 1);
      ctx.fillStyle = isHead ? '#ffd93d' : `hsl(${140 + t * 30}, 70%, ${45 + t * 15}%)`;
      roundRect(ctx, x + 1, y + 1, CELL - 2, CELL - 2, 5);
      ctx.fill();
      if (isHead) {
        // 眼睛
        ctx.fillStyle = '#2c1810';
        const cx = x + CELL / 2;
        const cy = y + CELL / 2;
        const ex = dir.x * CELL * 0.18;
        const ey = dir.y * CELL * 0.18;
        const ox = -dir.y * CELL * 0.22;
        const oy = dir.x * CELL * 0.22;
        ctx.beginPath();
        ctx.arc(cx + ex + ox, cy + ey + oy, 2.2, 0, Math.PI * 2);
        ctx.arc(cx + ex - ox, cy + ey - oy, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function loop(now) {
    if (!running) return;
    if (!lastTick) lastTick = now;
    if (!paused && now - lastTick >= tickMs) {
      lastTick = now;
      step();
    }
    draw();
    if (running) requestAnimationFrame(loop);
  }

  function start() {
    if (dead) reset();
    running = true;
    paused = false;
    dead = false;
    lastTick = 0;
    overlay.classList.add('hidden');
    requestAnimationFrame(loop);
  }

  function togglePause() {
    if (!running || dead) return;
    paused = !paused;
    if (paused) {
      overlayTitle.textContent = '⏸ 暫停';
      overlayMsg.innerHTML = '按 <b>空白鍵</b> 或下方按鈕繼續';
      startBtn.textContent = '▶ 繼續';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      lastTick = 0;
    }
  }

  function gameOver() {
    running = false;
    dead = true;
    overlayTitle.textContent = '💀 GAME OVER';
    overlayMsg.innerHTML = `本回合得分 <b>${score}</b>　最高紀錄 <b>${best}</b><br>按 <b>R</b> 或下方按鈕重玩`;
    startBtn.textContent = '🔄 重新開始';
    overlay.classList.remove('hidden');
  }

  function setDir(d) {
    const map = {
      U: { x: 0, y: -1 }, D: { x: 0, y: 1 },
      L: { x: -1, y: 0 }, R: { x: 1, y: 0 },
    };
    const nd = map[d];
    if (!nd) return;
    // 不能 180 度迴轉
    if (nd.x === -dir.x && nd.y === -dir.y) return;
    nextDir = nd;
  }

  // 鍵盤
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { setDir('U'); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { setDir('D'); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { setDir('L'); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { setDir('R'); e.preventDefault(); }
    else if (k === ' ') {
      if (!running && !dead) start();
      else togglePause();
      e.preventDefault();
    } else if (k === 'r') {
      reset(); start();
    }
  });

  // 觸控虛擬鍵
  document.getElementById('dpad').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (btn) setDir(btn.dataset.dir);
  });

  // 觸控滑動
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart || !e.changedTouches.length) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 'R' : 'L');
    else setDir(dy > 0 ? 'D' : 'U');
    touchStart = null;
  }, { passive: true });

  startBtn.addEventListener('click', () => {
    if (paused) togglePause();
    else start();
  });

  reset();
})();
</script>
</body>
</html>
