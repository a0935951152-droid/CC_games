<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忍豆風雲 🥷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 4px;
    text-shadow: 0 0 16px #ff6b6b;
  }
  .hint {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  #gameWrap {
    position: relative;
    border: 4px solid #ff6b6b;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,107,107,0.4);
    overflow: hidden;
  }
  canvas { display: block; background: #87ceeb; }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(15,20,40,0.92);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 5;
  }
  #overlay.hidden { display: none; }
  #overlay h2 {
    font-size: 40px;
    margin-bottom: 14px;
    text-shadow: 0 0 20px #ffd93d;
  }
  #overlay p { font-size: 16px; line-height: 1.9; opacity: 0.9; }
  .btn {
    margin-top: 22px;
    background: linear-gradient(135deg, #ffd93d, #ff6b6b);
    color: #2c1810;
    border: none;
    padding: 14px 40px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .keys { margin-top: 16px; font-size: 13px; opacity: 0.7; }
  .keys b { color: #ffd93d; }
  a.back {
    margin-top: 18px;
    color: #ffd93d;
    font-size: 14px;
    text-decoration: none;
  }
  a.back:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>🥷 忍豆風雲</h1>
<div class="hint">操控你的忍豆，用拳擊與手裏劍掃蕩來襲的敵忍！</div>

<div id="gameWrap">
  <canvas id="game" width="900" height="420"></canvas>
  <div id="overlay">
    <h2>🥷 忍豆風雲</h2>
    <p>波數越高，敵忍越兇猛！<br>守住你的生命值，成為傳說中的忍豆。</p>
    <div class="keys">
      <b>← →</b> 移動 ｜ <b>↑ / 空白</b> 跳躍 ｜ <b>J</b> 拳擊 ｜ <b>K</b> 手裏劍
    </div>
    <button class="btn" id="startBtn">開始修行</button>
  </div>
</div>
<a class="back" href="../index.html">← 回到遊戲中心</a>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 60;
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

const keys = {};
addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let state;

function newGame() {
  state = {
    running: true,
    player: {
      x: W/2, y: GROUND, vx: 0, vy: 0, w: 44, h: 56,
      facing: 1, hp: 100, maxHp: 100,
      onGround: true, punchT: 0, hurtT: 0
    },
    enemies: [],
    shurikens: [],
    particles: [],
    wave: 0,
    score: 0,
    waveTimer: 0,
    shurikenCD: 0,
    spawnLeft: 0,
    spawnTimer: 0
  };
  startWave();
}

function startWave() {
  state.wave++;
  state.spawnLeft = 3 + state.wave * 2;
  state.spawnTimer = 0;
  // 每波回復少量生命
  state.player.hp = Math.min(state.player.maxHp, state.player.hp + 12);
  spawnFloat('第 ' + state.wave + ' 波！', W/2, 120, '#ffd93d');
}

function spawnEnemy() {
  const fromLeft = Math.random() < 0.5;
  const speed = 1.2 + state.wave * 0.18 + Math.random() * 0.6;
  const tough = state.wave >= 4 && Math.random() < 0.3;
  state.enemies.push({
    x: fromLeft ? -40 : W + 40,
    y: GROUND,
    w: tough ? 48 : 40,
    h: tough ? 60 : 50,
    vy: 0, onGround: true,
    facing: fromLeft ? 1 : -1,
    speed: tough ? speed * 0.7 : speed,
    hp: tough ? 3 : 1,
    maxHp: tough ? 3 : 1,
    tough,
    hurtT: 0,
    atkCD: 0
  });
}

function spawnFloat(text, x, y, color) {
  state.particles.push({ kind: 'text', text, x, y, life: 70, color });
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    state.particles.push({
      kind: 'spark', x, y,
      vx: (Math.random()-0.5)*7,
      vy: (Math.random()-0.5)*7 - 2,
      life: 24 + Math.random()*16, color
    });
  }
}

function rectHit(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w)/2 &&
         Math.abs(a.y - a.h/2 - (b.y - b.h/2)) < (a.h + b.h)/2;
}

function update() {
  if (!state || !state.running) return;
  const p = state.player;

  // 玩家移動
  const SPD = 4.2;
  if (keys['arrowleft'])  { p.vx = -SPD; p.facing = -1; }
  else if (keys['arrowright']) { p.vx = SPD; p.facing = 1; }
  else p.vx = 0;

  if ((keys['arrowup'] || keys[' ']) && p.onGround) {
    p.vy = -13; p.onGround = false;
  }

  p.vy += 0.7;
  p.x += p.vx;
  p.y += p.vy;
  if (p.y >= GROUND) { p.y = GROUND; p.vy = 0; p.onGround = true; }
  p.x = Math.max(p.w/2, Math.min(W - p.w/2, p.x));

  if (p.punchT > 0) p.punchT--;
  if (p.hurtT > 0) p.hurtT--;
  if (state.shurikenCD > 0) state.shurikenCD--;

  // 拳擊
  if (keys['j'] && p.punchT === 0) {
    p.punchT = 16;
    const reach = { x: p.x + p.facing * 42, y: p.y, w: 40, h: 50 };
    for (const e of state.enemies) {
      if (rectHit(reach, e)) {
        e.hp--; e.hurtT = 10;
        e.x += p.facing * 26;
        burst(e.x, e.y - e.h/2, '#ff6b6b', 8);
        if (e.hp <= 0) killEnemy(e);
      }
    }
  }

  // 手裏劍
  if (keys['k'] && state.shurikenCD === 0) {
    state.shurikenCD = 22;
    state.shurikens.push({
      x: p.x + p.facing * 24, y: p.y - p.h/2,
      vx: p.facing * 9, spin: 0, w: 22, h: 22
    });
  }

  // 手裏劍飛行
  for (const s of state.shurikens) {
    s.x += s.vx; s.spin += 0.5;
    for (const e of state.enemies) {
      if (!e.dead && Math.abs(s.x - e.x) < (s.w + e.w)/2 &&
          Math.abs(s.y - (e.y - e.h/2)) < (s.h + e.h)/2) {
        e.hp -= 2; e.hurtT = 10;
        burst(e.x, e.y - e.h/2, '#4ecdc4', 10);
        s.dead = true;
        if (e.hp <= 0) killEnemy(e);
      }
    }
  }
  state.shurikens = state.shurikens.filter(s => !s.dead && s.x > -30 && s.x < W + 30);

  // 敵人生成
  if (state.spawnLeft > 0) {
    state.spawnTimer--;
    if (state.spawnTimer <= 0) {
      spawnEnemy();
      state.spawnLeft--;
      state.spawnTimer = 50 - Math.min(30, state.wave * 3);
    }
  } else if (state.enemies.length === 0) {
    state.waveTimer++;
    if (state.waveTimer > 60) { state.waveTimer = 0; startWave(); }
  }

  // 敵人 AI
  for (const e of state.enemies) {
    if (e.dead) continue;
    const dir = p.x > e.x ? 1 : -1;
    e.facing = dir;
    const dist = Math.abs(p.x - e.x);
    if (dist > 46) e.x += dir * e.speed;
    if (e.hurtT > 0) e.hurtT--;
    if (e.atkCD > 0) e.atkCD--;

    e.vy += 0.7; e.y += e.vy;
    if (e.y >= GROUND) { e.y = GROUND; e.vy = 0; }

    // 敵人攻擊玩家
    if (dist < 50 && e.atkCD === 0 && p.hurtT === 0) {
      e.atkCD = 40;
      p.hp -= e.tough ? 14 : 8;
      p.hurtT = 40;
      p.x += dir * 24;
      burst(p.x, p.y - p.h/2, '#ffd93d', 10);
      if (p.hp <= 0) { p.hp = 0; gameOver(); }
    }
  }
  state.enemies = state.enemies.filter(e => !e.dead);

  // 粒子
  for (const pa of state.particles) {
    pa.life--;
    if (pa.kind === 'spark') { pa.x += pa.vx; pa.y += pa.vy; pa.vy += 0.25; }
    else if (pa.kind === 'text') pa.y -= 0.6;
  }
  state.particles = state.particles.filter(pa => pa.life > 0);
}

function killEnemy(e) {
  e.dead = true;
  state.score += e.tough ? 30 : 10;
  burst(e.x, e.y - e.h/2, '#ffd93d', 16);
  spawnFloat('+' + (e.tough ? 30 : 10), e.x, e.y - e.h - 6, '#fff');
}

function gameOver() {
  state.running = false;
  overlay.classList.remove('hidden');
  overlay.querySelector('h2').textContent = '💀 忍豆殞落';
  overlay.querySelector('p').innerHTML =
    '你擐到了第 <b style="color:#ffd93d">' + state.wave + '</b> 波<br>' +
    '總得分：<b style="color:#ffd93d">' + state.score + '</b>';
  startBtn.textContent = '再戰一回';
}

// ===== 繪圖 =====
function drawBean(x, y, w, h, color, facing, hurt, punching) {
  ctx.save();
  ctx.translate(x, y - h/2);
  if (hurt) ctx.globalAlpha = 0.55;
  // 身體
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2);
  ctx.fill();
  // 忍者頭巾
  ctx.fillStyle = '#2c2c54';
  ctx.beginPath();
  ctx.ellipse(0, -h/4, w/2, h/4, 0, Math.PI, Math.PI*2);
  ctx.fill();
  ctx.fillRect(-w/2, -h/4 - 2, w, 6);
  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(facing*5, -h/8, 7, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(facing*7, -h/8, 3, 0, Math.PI*2);
  ctx.fill();
  // 拳頭
  if (punching) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(facing*(w/2 + 14), 4, 9, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function draw() {
  // 背景天空
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(1, '#fce8b2');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 遠山
  ctx.fillStyle = '#6b8e7f';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(i*260 - 60, GROUND);
    ctx.lineTo(i*260 + 80, GROUND - 150);
    ctx.lineTo(i*260 + 220, GROUND);
    ctx.fill();
  }
  // 太陽
  ctx.fillStyle = 'rgba(255,220,120,0.8)';
  ctx.beginPath();
  ctx.arc(W - 90, 80, 44, 0, Math.PI*2);
  ctx.fill();

  // 地面
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#5a9e3a';
  ctx.fillRect(0, GROUND, W, 14);

  if (!state) return;
  const p = state.player;

  // 手裏劍
  for (const s of state.shurikens) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.spin);
    ctx.fillStyle = '#444';
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI/2);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(11, -4);
      ctx.lineTo(13, 0);
      ctx.lineTo(11, 4);
      ctx.fill();
    }
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // 敵人
  for (const e of state.enemies) {
    drawBean(e.x, e.y, e.w, e.h, e.tough ? '#9b59b6' : '#e74c3c',
             e.facing, e.hurtT > 0, false);
    if (e.maxHp > 1) {
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x - 18, e.y - e.h - 10, 36, 5);
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(e.x - 18, e.y - e.h - 10, 36 * e.hp/e.maxHp, 5);
    }
  }

  // 玩家
  drawBean(p.x, p.y, p.w, p.h, '#f1c40f', p.facing, p.hurtT > 0, p.punchT > 8);

  // 粒子
  for (const pa of state.particles) {
    if (pa.kind === 'spark') {
      ctx.globalAlpha = Math.min(1, pa.life/20);
      ctx.fillStyle = pa.color;
      ctx.beginPath();
      ctx.arc(pa.x, pa.y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = Math.min(1, pa.life/30);
      ctx.fillStyle = pa.color;
      ctx.font = 'bold 22px Microsoft JhengHei';
      ctx.textAlign = 'center';
      ctx.fillText(pa.text, pa.x, pa.y);
      ctx.globalAlpha = 1;
    }
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(14, 14, 220, 26);
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(16, 16, 216 * p.hp/p.maxHp, 22);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Microsoft JhengHei';
  ctx.textAlign = 'left';
  ctx.fillText('❤ ' + p.hp + ' / ' + p.maxHp, 22, 32);

  ctx.textAlign = 'right';
  ctx.font = 'bold 20px Microsoft JhengHei';
  ctx.fillStyle = '#2c2c54';
  ctx.fillText('🌀 第 ' + state.wave + ' 波', W - 16, 32);
  ctx.fillText('⭐ ' + state.score, W - 16, 58);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  newGame();
});

loop();
</script>

</body>
</html>
